[phases.setup]
nixPkgs = ["php83", "php83Packages.composer", "nodejs_22"]

[phases.install]
cmds = [
    "composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader",
    "npm install"
]

[phases.build]
cmds = [
    "npm run build",
    "php artisan package:discover --ansi"
]

[start]
cmd = "./scripts/railway-start.sh"
